<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<title>Guía de Usuario - Intranet INFReserve</title>

@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Open+Sans:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Open Sans', sans-serif;
  background: #0f1a2e;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

.presentation {
  width: 100%;
  height: 100%;
  position: relative;
}

.slide {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
  opacity: 0;
  transition: opacity 0.5s ease;
  overflow: hidden;
}

.slide.active {
  display: flex;
  opacity: 1;
}

/* ===== SLIDE 1: PORTADA ===== */
.slide-1 {
  background: linear-gradient(145deg, #1a2a4a 0%, #1e3a5f 40%, #2c5282 100%);
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 60px;
}

.slide-1 .logo-wrap {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 50px;
}

.slide-1 .logo-wrap img {
  width: 110px;
  height: 110px;
  border-radius: 16px;
  background: white;
  padding: 10px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}

.slide-1 .logo-text h1 {
  font-family: 'Montserrat', sans-serif;
  font-size: 52px;
  font-weight: 900;
  color: white;
  letter-spacing: 3px;
  text-shadow: 0 4px 20px rgba(0,0,0,0.3);
}

.slide-1 .logo-text p {
  font-size: 18px;
  color: #90cdf4;
  font-weight: 500;
  letter-spacing: 1px;
}

.slide-1 .title-card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 24px;
  padding: 50px 100px;
  margin-bottom: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}

.slide-1 .title-card h2 {
  font-family: 'Montserrat', sans-serif;
  font-size: 44px;
  font-weight: 800;
  color: white;
  margin-bottom: 12px;
}

.slide-1 .title-card .sub {
  font-size: 24px;
  color: #a0d2ff;
  font-weight: 600;
}

.slide-1 .features {
  display: flex;
  gap: 50px;
  margin-top: 10px;
}

.slide-1 .feat {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #cbd5e0;
  font-size: 17px;
}

.slide-1 .feat .ic {
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.12);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}

.slide-1 .footer {
  position: absolute;
  bottom: 30px;
  color: rgba(255,255,255,0.35);
  font-size: 14px;
}

/* ===== HEADER COMÚN ===== */
.slide-header {
  height: 65px;
  background: linear-gradient(90deg, #1a2a4a, #2c5282);
  display: flex;
  align-items: center;
  padding: 0 45px;
  gap: 14px;
  flex-shrink: 0;
}

.slide-header img {
  width: 42px; height: 42px;
  border-radius: 10px;
  background: white;
  padding: 4px;
}

.slide-header h3 {
  font-family: 'Montserrat', sans-serif;
  color: white;
  font-size: 20px;
  font-weight: 700;
}

/* ===== SLIDE 2: ACCESO ===== */
.slide-2 {
  background: #f0f4f8;
}

.slide-2 .body {
  flex: 1;
  display: flex;
  gap: 35px;
  padding: 35px 45px;

}

.slide-2 .screenshot-box {

}

.slide-2 .screenshot-box img {

  display: block;
}

.slide-2 .steps {

}

.slide-2 .steps h2 {
  font-family: 'Montserrat', sans-serif;
  font-size: 30px;
  color: #1a2a4a;
  margin-bottom: 24px;
  font-weight: 800;
}

.step {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  margin-bottom: 14px;
  padding: 12px 16px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 3px 12px rgba(0,0,0,0.06);
  border-left: 4px solid #2c5282;
}

.step-num {
  width: 32px; height: 32px;

  background: linear-gradient(135deg, #2c5282, #1a2a4a);
  color: white;

}

.step-txt h4 {

}

.step-txt p {

}

.step-txt .hl {

  font-weight: 700;

.card h4 {

.row-flex {

.row-flex .card {

.tip-box {

.tip-box .txt {

}

.help-box {

  color: white;

}

.help-item {

/* ===== CONTROLES ===== */
.controls {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
  align-items: center;
  z-index: 1000;
  background: rgba(26, 42, 74, 0.92);
  padding: 10px 20px;
  border-radius: 50px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.3);
}

.ctrl-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.25);
  background: transparent;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.25s;
}

.ctrl-btn:hover {
  background: rgba(255,255,255,0.15);
  border-color: white;

}

.dots {
  display: flex;
  gap: 7px;
}

.dot {

  border-radius: 50%;

}

.dot.active {

.counter {
  color: white;

  font-weight: 600;

  text-align: center;

.hint {
  position: fixed;

  right: 16px;
  color: rgba(255,255,255,0.25);
  font-size: 11px;
  z-index: 1000;
}

@media (max-width: 1000px) {
  .row-flex { flex-direction: column; }
  .slide { padding: 15px; }
  .slide-2 .body { flex-direction: column; }
}
</style>
</head>

<!-- CONTROLES -->
<div class="controls">

  <div class="dots">

    <div class="dot" onclick="goToSlide(2)"></div>
    <div class="dot" onclick="goToSlide(3)"></div>
    <div class="dot" onclick="goToSlide(4)"></div>
    <div class="dot" onclick="goToSlide(5)"></div>
    <div class="dot" onclick="goToSlide(6)"></div>
    <div class="dot" onclick="goToSlide(7)"></div>
  </div>
  <span class="counter"><span id="cur">1</span> / 7</span>
  <button class="ctrl-btn" onclick="nextSlide()" title="Siguiente">▶</button>
</div>

<div class="hint">← → Espacio · F11 Pantalla completa</div>

<script>
let cur = 1;
const tot = 7;

function show(n) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
  document.querySelector('.slide[data-slide="' + n + '"]').classList.add('active');
  document.querySelectorAll('.dot')[n-1].classList.add('active');
  document.getElementById('cur').textContent = n;
  cur = n;
}

function nextSlide() { if (cur < tot) show(cur + 1); }
function prevSlide() { if (cur > 1) show(cur - 1); }
function goToSlide(n) { show(n); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextSlide(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevSlide(); }
});
</script>
